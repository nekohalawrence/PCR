# name: mihomo
# update_date: 20251121
# update_url: https://raw.githubusercontent.com/nekohalawrence/PCR/main/config/mihomo-stable.yaml
# repo: https://github.com/nekohalawrence/PCR/tree/main/config
# 图标备用: 📮✉️📪📬💫💬💥🔨🥼🚫🔰🙈🍎🎬📺🎱🍐🐝🦁💡🌵🐯🎸💻📽🌏🕹📡🦑🌟🐷🦒🐳🚦📵🎧💊🔓🚦🚥🐼⛔️🈲🌐🎯🖲️🐦🔞🎵📱🚀💳♻️🙈🍱🔂📦🔀⏱


# -------------------------------------
# 出站配置
# -------------------------------------
# 代理集-锚点配置
proxy-provider-anchor:
  NodeParam: &NodeParam {type: http, interval: 3600, health-check: {enable: true, lazy: false, url: 'https://www.google.com/generate_204', timeout: 3000, interval: 3600, expected-status: 204}}

# 出站-本地节点
proxies: null

# 出站-代理集
proxy-providers:
  Sub01:
    # 使用上述锚点配置
    <<: *NodeParam
    url: ""
    # 文件存储路径
    path: ./provider/proxyset/Sub01.yaml
    override:
      # 为订阅节点添加机场名称前缀
      additional-prefix: "[Sub01]"

  
# -------------------------------------
# 全局配置
# -------------------------------------
allow-lan: true   # 允许局域网连接
bind-address: "*" # 绑定 IP 地址，仅作用于 allow-lan 为 true，'*'表示所有地址

# -------------------------------------
mode: rule 
log-level: info         # 日志等级 silent/error/warning/info/debug。
ipv6: true              # 开启 IPv6 总开关，关闭阻断所有 IPv6 链接和屏蔽 DNS 请求 AAAA 记录。
# 控制是否让 Clash 去匹配进程，always 开启，强制匹配所有进程；strict(默认)由 Clash 判断是否开启；off 不匹配进程，推荐在路由器上使用此模式。
find-process-mode: always
unified-delay: true     # 开启统一延迟时，会计算 RTT，以消除连接握手等带来的不同类型节点的延迟差异
tcp-concurrent: true    # TCP 并发
disable-keep-alive: true
# 缓存，存储 select 选择记录，持久化 fake-ip
profile: {store-selected: true, store-fake-ip: true}
global-client-fingerprint: chrome

# -------------------------------------
# 外部控制器，可以使用 RESTful API 来控制你的 Clash 内核
external-controller: 0.0.0.0:9090   # API 监听地址，你可以将 127.0.0.1 修改为 0.0.0.0 来监听所有 IP
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"
external-ui: "./Web/Zash/"
secret: "xiaoe"                     # API 的访问密钥

# -------------------------------------
# GEODATA 配置
# GEOIP 数据模式
geodata-mode: false        # 更改 geoip 使用文件，mmdb 或者 dat，可选 true/false,true 为 dat，此项有默认值 false。
# GEO 文件加载模式，standard：标准加载器；memconservative：专为内存受限 (小内存) 设备优化的加载器 (默认值)
geodata-loader: standard
geo-auto-update: true      # 是否自动更新
geo-update-interval: 24    # 单位h（时），每24小时更新一次
geox-url:                  # 自定义 geodata url（更新地址）
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

# -------------------------------------
# 实验性配置
experimental:
  http-headers:
    request:
      - name: "User-Agent"
        value: "Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Mobile Safari/537.36"
      - name: "Accept-Language"
        value: "en-US,en;q=0.9"


# -------------------------------------
# 入站配置
# -------------------------------------
# 代理端口配置
# port: 7890         # http 代理端口
# socks-port: 7891   # SOCKS5 代理服务端口
mixed-port: 7893     # 混合端口，同时支持 HTTP(S) 和 SOCKS5 协议。您可以使用任何支持 HTTP 或 SOCKS 代理的程序连接到这个端口。

# -------------------------------------
# 配置虚拟网卡，在 tun 模式下必须获得 IP 地址。
tun:
  enable: true
  stack: mixed
  device: mihomo
  # dns 劫持，将匹配到的连接导入内部 dns 模块，不书写协议则为 udp://
  dns-hijack: ['any:53', "tcp://any:53"]       
  auto-route: true             # 自动设置全局路由，可以自动将全局流量路由进入 tun 网卡。
  strict-route: true           # 防止地址泄漏，并使 DNS 劫持在 Android 上工作。
  auto-detect-interface: true  # 自动选择流量出口接口，多出口网卡同时连接的设备建议手动指定出口网卡


# -------------------------------------
# DNS配置
# -------------------------------------
# 嗅探域名
sniffer:
  enable: true  
  force-dns-mapping: false     # 对 redir-host 类型识别的流量进行强制嗅探
  parse-pure-ip: false         # 对所有未获取到域名的流量进行强制嗅探
  override-destination: false  # 是否使用嗅探结果作为实际访问
  sniff: {HTTP: {ports: [80, 8080-8880], override-destination: true}, TLS: {ports: [443, 8443]}, QUIC: {ports: [443, 8443]}}
  force-domain:
    - +.v2ex.com
  skip-domain:
    - Mijia Cloud
    - '+.apple.com'

# -------------------------------------
hosts:
  ## DNS hosts
  dns.alidns.com: [223.5.5.5, 223.6.6.6]
  dns.cloudflare.com: [104.16.133.229, 104.16.132.229]
  dns.google: [8.8.4.4, 8.8.8.8]
  dns.twnic.tw: 101.101.101.101
  doh.pub: [1.12.12.12, 120.53.53.53]
  doh.opendns.com: 146.112.41.2

# -------------------------------------
# DNS 锚点配置
dns-anchor:
  udp-1: &udp-1 [system, 223.5.5.5, 119.29.29.29, 180.184.2.2, 114.114.114.114, 1.2.4.8]
  udp-2: &udp-2 [223.5.5.5, 119.29.29.29, 114.114.114.114, 1.2.4.8]
  doh-1: &doh-1 [https://dns.google/dns-query, https://dns.cloudflare.com/dns-query]
  doh-2: &doh-2 [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
  doh-3: &doh-3 [https://dns.alidns.com/dns-query, https://doh.pub/dns-query, https://dns.google/dns-query, https://dns.cloudflare.com/dns-query]

dns:
  enable: true          # 关闭将使用系统 DNS
  prefer-h3: false      # 是否开启 DoH 支持 HTTP/3，将并发尝试
  listen: 0.0.0.0:1053  # DNS 服务监听，仅支持 udp
  ipv6: true            # 是否解析 IPV6, 如为 false, 则回应 AAAA 的空解析
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  # fakeip 过滤，默认黑名单，即以下地址不会下发 fakeip 映射用于连接，回到 redir-host 模式。
  fake-ip-filter: ['rule-set:fakeip-filter,connectivity-check,private,cn']
  # ----------------DNS 服务配置--------------------
  # 默认 DNS, 用于解析 DNS 服务器 的域名，必须为 IP, 可为加密 DNS
  default-nameserver: *udp-2
  # 专用于节点域名解析的 DNS 服务器，非必要配置项，因为大部分的代理服务器都是 IP 地址
  proxy-server-nameserver: *doh-3
  nameserver-policy:
    'rule-set:connectivity-check,private,cn': *udp-1
  # 兜底，默认的域名解析服务器，解析代理服务器的 IP 地址；匹配直连策略或遇到 IP 规则时会进行本地（直连） DNS 解析，如不配置 fallback/proxy-server-nameserver , 则所有域名都由 nameserver 解析。
  nameserver: *udp-1
  fallback: *doh-2
  fallback-filter: 
    geoip: false
    geoip-code: CN
    # 污染 IP 或保留的 IP 地址段
    ipcidr:
      - 203.208.46.146/32    # 电信
      - 219.133.40.99/32     # 电信
      - 59.24.3.173/32       # 联通
      - 61.240.145.66/32     # 联通
      - 183.232.231.131/32   # 移动
      - 111.202.21.1/32      # 移动
      - 240.0.0.0/4          # 保留地址段
      - 127.0.0.1/32         # 通用/回环
      - 0.0.0.0/32           # 通用/回环
      - 2408:4000::1/128     # 通用/回环
      - 2409:8c00::1/128     # 通用/回环
      - ::/128               # 通用/回环


# -------------------------------------
# 策略组(代理组)
# -------------------------------------
# 地区节点筛选锚点配置
regular-anchor:
  ## Africa
  filterIN: &filterIN '^(?=.*((?i)🇮🇳|印度|班加罗尔|孟买|(\b(Mumbai|IN|India)\d{0,2}\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  ## Asia
  filterHK: &filterHK '^(?=.*((?i)🇭🇰|香港|HK_speednode|(\b(HK|Hong)\d{0,2}\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  filterJP: &filterJP '^(?=.*((?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\b(JP|Japan)\d{0,2}\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  filterKR: &filterKR '^(?=.*((?i)🇰🇷|韩国|韓|首尔|(\b(KR|Korea)\d{0,2}\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  filterMO: &filterMO '^(?=.*((?i)🇲🇴|澳门|(\b(MO|Oman)\d{0,2}\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  filterRU: &filterRU '^(?=.*((?i)🇷🇺|俄罗斯|莫斯科|新西伯利亚|RU|(\b(Новосиби́рская|Moscow|Russia)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  filterSG: &filterSG '^(?=.*((?i)🇸🇬|新加坡|狮|SG_speednode|(\b(SG|Singapore)\d{0,2}\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  filterTW: &filterTW '^(?=.*((?i)🇹🇼|台湾|TW_speednode|(\b(TW|Tai|Taiwan)\d{0,2}\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  ## Australia
  filterAU: &filterAU '^(?=.*((?i)🇦🇺|澳大利亚|AU_speednode|(\b(AU|Australia)\d{0,2}\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  ## Europe
  filterAR: &filterAR '^(?=.*((?i)🇦🇷|阿根廷|AR_speednode|(\b(AR|Argentinaia)\d{0,2}\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  filterDE: &filterDE '^(?=.*((?i)🇩🇪|德国|DE_speednode|(\b(DE|Germany)\d{0,2}\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  filterFR: &filterFR '^(?=.*((?i)🇫🇷|法国|FR_speednode|(\b(FR|FRA|France)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  filterIE: &filterIE '^(?=.*((?i)🇮🇪|爱尔兰|IE_speednode|(\b(IE|IRL|Ireland)(\d+)?\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  filterNL: &filterNL '^(?=.*((?i)🇳🇱|荷兰|NL_speednode|(\b(NL|Holland|Netherlands)\d{0,2}\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  filterTR: &filterTR '^(?=.*((?i)🇹🇷|土耳其|(\b(TR|TUR|Turkey)\d{0,2}\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  filterUK: &filterUK '^(?=.*((?i)🇬🇧|英国|伦敦|GB_speednode|(\b(UK|United Kingdom)\d{0,2}\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  ## North America
  filterCA: &filterCA '^(?=.*((?i)🇨🇦|加拿大|(\b(CA|Canada)\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  filterUS: &filterUS '^(?=.*((?i)🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US_speednode|(\b(US|United States)\d{0,2}\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  ## other
  # ^(?=.*(.))(?!.*((?i)群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|(\b(USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author)\b|(\d{4}-\d{2}-\d{2}|\dG)))).*$
  filterAll: &filterAll '.*'
  filterOther: &filterOther '^(?!.*(?i)(🇮🇳|印度|班加罗尔|孟买|(\b(Mumbai|IN|India)\d{0,2}\b)|🇭🇰|香港|HK_speednode|(\b(HK|Hong)\d{0,2}\b)|🇯🇵|日本|川日|东京|大阪|泉日|埼玉|(\b(JP|Japan)\d{0,2}\b)|🇰🇷|韩国|韓|首尔|(\b(KR|Korea)\d{0,2}\b)|🇲🇴|澳门|(\b(MO|Oman)\d{0,2}\b)|🇷🇺|俄罗斯|莫斯科|新西伯利亚|RU|(\b(Новосиби́рская|Moscow|Russia)\b)|🇸🇬|新加坡|狮|SG_speednode|(\b(SG|Singapore)\d{0,2}\b)|🇹🇼|台湾|TW_speednode|(\b(TW|Tai|Taiwan)\d{0,2}\b)|🇦🇺|澳大利亚|AU_speednode|(\b(AU|Australia)\d{0,2}\b)|🇦🇷|阿根廷|AR_speednode|(\b(AR|Argentinaia)\d{0,2}\b)|🇩🇪|德国|DE_speednode|(\b(DE|Germany)\d{0,2}\b)|🇫🇷|法国|FR_speednode|(\b(FR|FRA|France)(\d+)?\b)|🇮🇪|爱尔兰|IE_speednode|(\b(IE|IRL|Ireland)(\d+)?\b)|🇳🇱|荷兰|NL_speednode|(\b(NL|Holland|Netherlands)\d{0,2}\b)|🇹🇷|土耳其|(\b(TR|TUR|Turkey)\d{0,2}\b)|🇬🇧|英国|伦敦|GB_speednode|(\b(UK|United Kingdom)\d{0,2}\b)|🇨🇦|加拿大|(\b(CA|Canada)\b)|🇺🇸|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US_speednode|(\b(US|United States)\d{0,2}\b)))(?!.*((?i)回国|校园|游戏|🎮|(\b(GAME)\b))).*$'
  filterGL: &filterGL '^(?=.*(.*))(?!.*((?i)邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|到期|过期|已用|联系|邮箱|工单|群|贩卖|通知|倒卖|防止|国内|🎮|(\b(GAME|USE|USED|TOTAL|EXPIRE|EMAIL|Panel)\d{0,2}\b|(\d{4}-\d{2}-\d{2}|\dG)))).*$'
  filterBack: &filterBack '^(?=.*(回国))(?!.*((?i)校园|游戏|🎮|(\b(GAME)\b))).*$'
  filterGame: &filterGame '^(?=.*((?i)游戏|🎮|(\b(GAME)\d{0,2}\b)))(?!.*((?i)回国|校园)).*$'

# 策略组锚点
strategy-anchor:  
  ## 手动选择参数
  select-test: &select-test {type: select, interval: 360, url: 'https://cp.cloudflare.com', disable-udp: false, timeout: 3000, max-failed-times: 3, lazy: true, hidden: false, expected-status: 204}
  select-direct: &select-direct {type: select, proxies: [🎯 Direct, 🚀 Proxy, 🇮🇳 India, 🇭🇰 Hong Kong, 🇯🇵 Japan, 🇰🇷 Korea, 🇲🇴 Oman, 🇷🇺 Russia, 🇸🇬 Singapore, 🇨🇳 Taiwan, 🇦🇺 Australia, 🇦🇷 Argentinaia, 🇫🇷 France, 🇩🇪 Germany, 🇳🇱 Netherlands, 🇹🇷 Turkey, 🇬🇧 United Kingdom, 🇨🇦 Canada, 🇺🇸 United States]}
  select-proxy: &select-proxy {type: select, proxies: [🚀 Proxy, 🎯 Direct, 🇮🇳 India, 🇭🇰 Hong Kong, 🇯🇵 Japan, 🇰🇷 Korea, 🇲🇴 Oman, 🇷🇺 Russia, 🇸🇬 Singapore, 🇨🇳 Taiwan, 🇦🇺 Australia, 🇦🇷 Argentinaia, 🇫🇷 France, 🇩🇪 Germany, 🇳🇱 Netherlands, 🇹🇷 Turkey, 🇬🇧 United Kingdom, 🇨🇦 Canada, 🇺🇸 United States]}
  ## 时延优选参数
  urltest: &urltest {type: url-test, tolerance: 45, interval: 0, url: 'https://cp.cloudflare.com', disable-udp: false, timeout: 3000, max-failed-times: 3, lazy: true, hidden: true, include-all: true, expected-status: 204}
  ## 故障转移参数
  fallback: &fallback {type: fallback, url: 'https://cp.cloudflare.com', disable-udp: false, timeout: 3000, max-failed-times: 3, lazy: true, hidden: true, include-all: true, expected-status: 204}
  ## 负载均衡参数
  loadbalance-roundrobin: &loadbalance-roundrobin {type: load-balance, strategy: round-robin, interval: 0, url: 'https://cp.cloudflare.com', disable-udp: false, timeout: 3000, max-failed-times: 3, lazy: true, hidden: true, include-all: true, expected-status: 204}
  loadbalance-consistent: &loadbalance-consistent {type: load-balance, strategy: consistent-hashing, interval: 0, url: 'https://cp.cloudflare.com', disable-udp: false, timeout: 3000, max-failed-times: 3, lazy: true, hidden: true, include-all: true, expected-status: 204}
  loadbalance-sticky: &loadbalance-sticky {type: load-balance, strategy: sticky-sessions, interval: 0, url: 'https://cp.cloudflare.com', disable-udp: false, timeout: 3000, max-failed-times: 3, lazy: true, hidden: true, include-all: true, expected-status: 204}
# -------------------------------------
# 策略组
proxy-groups:
  # ----------------节点选择策略组--------------------
  # 模块化选择
  - {name: 🚀 Proxy, type: select, proxies: [🗺 Nation-urltest, 🗺 Nation-roundrobin , 🗺 Nation-consistent, 🎯 Direct], icon: https://fastly.jsdelivr.net/gh/Koolson/Qure/IconSet/Color/Rocket.png}
  # 兜底策略组
