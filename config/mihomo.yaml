# 规则类型-规则-策略组
rules:
  # ----------------直连--------------------
  # 本地网络
  - RULE-SET,private,🎯 Direct
  - RULE-SET,privateip,🎯 Direct,no-resolve
  # 工具平台
  ## 外部控制
  - RULE-SET,externalcontrol,🎯 Direct
  # 服务平台
  ## CDN 服务和代理加速服务
  - RULE-SET,fastly,🎯 Direct
  - RULE-SET,jsdelivr,🎯 Direct
  - RULE-SET,githubproxy,🎯 Direct
  ## 直连软件
  - RULE-SET,applications,🎯 Direct
  ## Google 服务，大部分时间不可用
  # - RULE-SET,google@cn,🎯 Direct
  ## 苹果服务
  - RULE-SET,apple@cn,🎯 Direct
  ## 微软服务
  - RULE-SET,microsoft@cn,🎯 Direct
  # 娱乐平台
  - RULE-SET,steam@cn,🎯 Direct
  - RULE-SET,game@cn,🎯 Direct
  # 漏网之鱼
  - RULE-SET,cnlite,🎯 Direct

  # ----------------混合--------------------
  - DOMAIN-SUFFIX,steamcommunity.com,🚀 Proxy
  # 服务平台
  - RULE-SET,cloudflare,☁ Cloudflare
  ## 支付服务
  - RULE-SET,paypal,💴 PayPal
  ## 代码托管平台
  - RULE-SET,github,🐱 Github
  - RULE-SET,gitlab,🐱 Github
  ## 游戏平台
  - RULE-SET,steam,🎮 GameGlobal
  - RULE-SET,gameglobal,🎮 GameGlobal
  - RULE-SET,gameglobalip,🎮 GameGlobal,no-resolve

  # ----------------代理--------------------
  # 服务平台
  ## 人工智能
  - RULE-SET,gemini,🤖 AI
  - RULE-SET,aiglobal,🤖 AI
  # 社交通讯平台
  - RULE-SET,telegram,🚀 Proxy
  - RULE-SET,telegramip,🚀 Proxy,no-resolve
  - RULE-SET,discord,🐦 Discord
  - RULE-SET,facebook,💬 Facebook
  - RULE-SET,twitter,💬 Twitter
  # 娱乐平台
  ## 音乐平台
  - RULE-SET,spotify,🎵 Spotify
  ## 短视频和直播
  - RULE-SET,tiktokglobal,🎵 TikTok
  - RULE-SET,disney,📽️ Disney+
  - RULE-SET,netflix,🎥 Netflix
  - RULE-SET,max,🎞️ Max
  - RULE-SET,youtube,📹 YouTube
  ## 插画站
  - RULE-SET,pixiv,🖼️ Pixiv
  - RULE-SET,18comic,🖼️ 18comic
  # 漏网之鱼
  - RULE-SET,gfwlite,🚀 Proxy
  
  # ----------------综合规则集--------------------
  # 综合国外代理
  ## 苹果服务
  - RULE-SET,apple,🍎 AppleService
  ## 微软服务
  - RULE-SET,microsoft,Ⓜ️ MicrosoftService
  ## Google 服务
  - RULE-SET,google,📢 GoogleService
  - RULE-SET,proxy,🚀 Proxy
  - RULE-SET,tld-proxy,🚀 Proxy
